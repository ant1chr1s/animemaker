<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Plot Maker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B0B0D">
<style>
  :root{
    --ink:#0B0B0D;
    --panel:#161618;
    --paper:#F5F1E8;
    --red:#C81E3A;
    --red-dark:#8f1327;
    --gold:#D4A537;
    --grey:#4a4a4f;
    --grey-light:#8a8a90;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--paper);
    font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;overflow-x:hidden;}
  body{
    background-image:
      radial-gradient(circle at 2px 2px, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size:14px 14px;
  }
  .display{font-family:'Arial Black','Arial Narrow',Impact,sans-serif;font-weight:900;
    letter-spacing:1px;text-transform:uppercase;}

  #app{max-width:720px;margin:0 auto;padding:24px 18px 60px;min-height:100vh;position:relative;}

  /* ---------- Kopfzeile ---------- */
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
  .logo{display:flex;align-items:center;gap:10px;}
  .logo .mark{width:38px;height:38px;background:var(--red);border-radius:3px;
    display:flex;align-items:center;justify-content:center;font-size:20px;
    transform:rotate(-4deg);box-shadow:3px 3px 0 rgba(0,0,0,0.5);}
  .logo h1{font-size:20px;margin:0;letter-spacing:2px;}
  .navbtn{background:transparent;border:2px solid var(--grey);color:var(--paper);
    padding:8px 14px;border-radius:4px;cursor:pointer;font-size:13px;letter-spacing:1px;
    text-transform:uppercase;transition:.15s;}
  .navbtn:hover{border-color:var(--gold);color:var(--gold);}

  /* ---------- Speedlines Hero ---------- */
  .speedlines{position:relative;overflow:hidden;border-radius:8px;margin-bottom:24px;
    background:linear-gradient(135deg, #1a1a1d 0%, var(--ink) 60%);
    border:2px solid var(--grey);padding:26px 20px;}
  .speedlines::before{content:"";position:absolute;inset:0;opacity:.5;
    background:repeating-linear-gradient(115deg, transparent 0 18px, rgba(255,255,255,0.025) 18px 20px);
    pointer-events:none;}
  .hero-title{font-size:28px;line-height:1.15;margin:0 0 8px;}
  .hero-sub{color:var(--grey-light);font-size:14px;margin:0;}

  /* ---------- Cards / Panels ---------- */
  .panel{background:var(--panel);border:2px solid var(--grey);border-radius:8px;
    padding:20px;margin-bottom:18px;}
  label{display:block;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--grey-light);margin-bottom:8px;}
  input[type=text]{width:100%;background:#0e0e10;border:2px solid var(--grey);
    color:var(--paper);padding:12px 14px;border-radius:6px;font-size:16px;}
  input[type=text]:focus{outline:none;border-color:var(--gold);}

  .btn{display:inline-block;background:var(--red);color:#fff;border:none;
    padding:13px 22px;border-radius:6px;font-size:15px;letter-spacing:1px;
    text-transform:uppercase;font-weight:700;cursor:pointer;transition:.15s;
    box-shadow:3px 3px 0 rgba(0,0,0,0.4);}
  .btn:hover{background:var(--red-dark);transform:translate(1px,1px);box-shadow:2px 2px 0 rgba(0,0,0,0.4);}
  .btn:disabled{background:var(--grey);cursor:not-allowed;box-shadow:none;}
  .btn.secondary{background:transparent;border:2px solid var(--gold);color:var(--gold);box-shadow:none;}
  .btn.secondary:hover{background:rgba(212,165,55,0.1);}
  .btn.block{width:100%;text-align:center;}

  /* ---------- Progress ---------- */
  .progress-wrap{margin-bottom:18px;}
  .progress-label{font-size:12px;color:var(--grey-light);letter-spacing:1px;
    text-transform:uppercase;margin-bottom:6px;display:flex;justify-content:space-between;}
  .progress-bar{height:8px;background:#222225;border-radius:4px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));
    transition:width .3s;}

  /* ---------- Kategorie / Roulette ---------- */
  .cat-icon{font-size:34px;text-align:center;margin-bottom:2px;}
  .cat-title{text-align:center;font-size:24px;margin:0 0 4px;}
  .cat-hint{text-align:center;color:var(--grey-light);font-size:13px;margin-bottom:20px;}

  .vs-wrap{position:relative;display:flex;gap:14px;align-items:stretch;}
  .vs-badge{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    background:var(--red);color:#fff;font-family:'Arial Black',Impact,sans-serif;
    font-weight:900;font-size:15px;width:44px;height:44px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;z-index:5;
    box-shadow:0 0 0 4px var(--ink), 3px 3px 0 rgba(0,0,0,0.5);transform:translate(-50%,-50%) rotate(-8deg);}

  .slot{flex:1;background:#0e0e10;border:2px solid var(--grey);border-radius:8px;
    padding:18px 14px;min-height:130px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;cursor:pointer;
    transition:border-color .15s, transform .15s;position:relative;}
  .slot:hover{border-color:var(--gold);}
  .slot.spinning{cursor:default;border-color:var(--grey);}
  .slot.chosen{border-color:var(--gold);background:rgba(212,165,55,0.08);
    box-shadow:0 0 0 2px var(--gold);}
  .slot-value{font-size:16px;font-weight:700;line-height:1.3;}
  .slot-expl{font-size:12px;color:var(--grey-light);margin-top:6px;line-height:1.35;}
  .slot-reroll{margin-top:12px;background:transparent;border:1px solid var(--grey);
    color:var(--grey-light);font-size:12px;padding:5px 10px;border-radius:5px;cursor:pointer;}
  .slot-reroll:hover{border-color:var(--gold);color:var(--gold);}
  .slot-reroll:disabled{opacity:.4;cursor:not-allowed;}

  .cat-footer{display:flex;justify-content:space-between;margin-top:20px;}

  /* ---------- Summary ---------- */
  .summary-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #232326;font-size:14px;}
  .summary-item:last-child{border-bottom:none;}
  .summary-icon{width:22px;text-align:center;}
  .summary-label{color:var(--grey-light);min-width:110px;}
  .summary-val{font-weight:600;}

  /* ---------- Plot ---------- */
  .plot-box{background:#0e0e10;border-left:4px solid var(--red);border-radius:0 8px 8px 0;
    padding:20px;line-height:1.7;font-size:15.5px;}
  .plot-box p{margin:0;}

  /* ---------- Gallery ---------- */
  .char-card{background:var(--panel);border:2px solid var(--grey);border-radius:8px;
    padding:16px;margin-bottom:14px;}
  .char-card h3{margin:0 0 6px;font-size:18px;}
  .char-card .meta{font-size:12px;color:var(--grey-light);margin-bottom:10px;}
  .char-card .plot-preview{font-size:14px;color:#cfcfd2;line-height:1.55;}
  .char-card .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
  .tag{background:#0e0e10;border:1px solid var(--grey);border-radius:4px;
    padding:3px 8px;font-size:11px;color:var(--grey-light);}

  .center{text-align:center;}
  .muted{color:var(--grey-light);}
  .spacer{height:10px;}
  .loader{display:inline-block;width:16px;height:16px;border:2px solid var(--grey);
    border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--panel);border:2px solid var(--gold);color:var(--paper);
    padding:10px 18px;border-radius:6px;font-size:14px;z-index:50;display:none;}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>

<script src="data.js"></script>
<script src="templates.js"></script>
<script src="github-store.js"></script>
<script src="app.js"></script>
</body>
</html>
